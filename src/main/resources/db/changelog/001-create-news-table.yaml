databaseChangeLog:
  - changeSet:
      id: 1
      author: news-service
      changes:
        - createTable:
            tableName: news
            columns:
              - column:
                  name: news_id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
                    autoIncrement: true
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(1000)
              - column:
                  name: reported_by
                  type: VARCHAR(255)
              - column:
                  name: reported_at
                  type: TIMESTAMP