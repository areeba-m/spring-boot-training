databaseChangeLog:
  - changeSet:
      id: 4-insert-initial-api-users
      author: api-user-service
      changes:
        - insert:
            tableName: api_user
            columns:
              - column:
                  name: username
                  value: admin
              - column:
                  name: password
                  value: "{bcrypt}$2a$10$8.UnVuG9HHgUDzoMcNYY7eZxy1TOC5b18m3EPY.B6Y1N/I6b6pS2y" # BCrypt for 'password123'
              - column:
                  name: role
                  value: ADMIN

        # 2. Insert EDITOR user
        - insert:
            tableName: api_user
            columns:
              - column:
                  name: username
                  value: editor
              - column:
                  name: password
                  value: "{bcrypt}$2a$12$b2po9451UN9mta.ZDUOyhefbQVH1U7eZOiUqgndkzLfkoVrXU4fDq" # BCrypt for 'password123'
              - column:
                  name: role
                  value: EDITOR

        # 3. Insert REPORTER user
        - insert:
            tableName: api_user
            columns:
              - column:
                  name: username
                  value: reporter
              - column:
                  name: password
                  value: "{bcrypt}$2a$12$b2po9451UN9mta.ZDUOyhefbQVH1U7eZOiUqgndkzLfkoVrXU4fDq" # BCrypt for 'password123'
              - column:
                  name: role
